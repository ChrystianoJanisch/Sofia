<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>FLC Bank — Julia.ia</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --gold: #cdb34d;
            --gold-light: #ddc96a;
            --gold-dim: rgba(205, 179, 77, 0.1);
            --gold-border: rgba(205, 179, 77, 0.18);
            --black: #000;
            --black-2: #0a0a0a;
            --black-3: #111;
            --white: #fff;
            --gray: #909090;
            --gray-dim: #444;
            --red: #f87171
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--black);
            color: var(--white);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center
        }

        .top-line {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent)
        }

        .login-card {
            width: 100%;
            max-width: 380px;
            padding: 48px 32px;
            margin: 20px;
            text-align: center
        }

        .login-card img {
            height: 36px;
            margin-bottom: 32px
        }

        .login-card h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 28px;
            font-weight: 400;
            color: var(--white);
            margin-bottom: 8px
        }

        .login-card p {
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--gray-dim);
            margin-bottom: 40px
        }

        .field {
            margin-bottom: 16px;
            text-align: left
        }

        .field label {
            display: block;
            font-size: 8px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 6px
        }

        .field input {
            width: 100%;
            background: transparent;
            border: 1px solid var(--gold-border);
            padding: 14px 16px;
            color: var(--white);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            outline: none;
            transition: border-color .2s;
            -webkit-appearance: none;
            border-radius: 0
        }

        .field input:focus {
            border-color: var(--gold)
        }

        .field input::placeholder {
            color: var(--gray-dim)
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: var(--gold);
            color: var(--black);
            border: none;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 600;
            transition: background .2s;
            margin-top: 8px
        }

        .btn-login:hover {
            background: var(--gold-light)
        }

        .btn-login:disabled {
            opacity: .5;
            cursor: not-allowed
        }

        .error-msg {
            color: var(--red);
            font-size: 12px;
            margin-top: 16px;
            min-height: 20px
        }

        .footer {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 10px;
            color: var(--gray-dim);
            letter-spacing: 1px
        }
    </style>
</head>

        <h1>Acesso ao Painel</h1>
        <p>Julia.ia — CRM &amp; Agenda</p>
        <div class="field">
            <label>E-mail</label>
            <input type="email" id="email" placeholder="seu@email.com" autocomplete="email">
        </div>
        <div class="field">
            <label>Senha</label>
            <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
        </div>
        <button class="btn-login" id="btn-login" onclick="doLogin()">Entrar</button>
        <div class="error-msg" id="error-msg"></div>
    </div>
    <div class="footer">FLC Bank © 2026</div>
    <script>
        document.getElementById('password').addEventListener('keydown', function (e) { if (e.key === 'Enter') doLogin() });
        document.getElementById('email').addEventListener('keydown', function (e) { if (e.key === 'Enter') document.getElementById('password').focus() });

        if (localStorage.getItem('sofia_token')) {
            fetch('/api/auth/me', { headers: { 'Authorization': 'Bearer ' + localStorage.getItem('sofia_token') } })
                .then(function (r) { if (r.ok) window.location.href = '/dashboard' })
                .catch(function () { })
        }

        function doLogin() {
            var email = document.getElementById('email').value.trim();
            var pass = document.getElementById('password').value;
            var btn = document.getElementById('btn-login');
            var err = document.getElementById('error-msg');
            if (!email || !pass) { err.textContent = 'Preencha todos os campos'; return }
            btn.disabled = true; btn.textContent = 'Entrando...'; err.textContent = '';
            fetch('/api/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email: email, password: pass }) })
                .then(function (r) {
                    if (!r.ok) { var st = r.status; return r.text().then(function (t) { try { var d = JSON.parse(t); throw new Error(d.detail || 'Erro ' + st) } catch (e) { if (e.message.indexOf('Erro') === 0 || e.message.indexOf('E-mail') === 0 || e.message.indexOf('Usuário') === 0) throw e; throw new Error('Erro no servidor (' + st + '). Tente novamente.') } }) }
                    return r.json()
                })
                .then(function (d) {
                    localStorage.setItem('sofia_token', d.token);
                    localStorage.setItem('sofia_user', JSON.stringify(d.user));
                    window.location.href = '/dashboard';
                })
                .catch(function (e) {
                    err.textContent = e.message || 'Erro ao fazer login';
                    btn.disabled = false; btn.textContent = 'Entrar';
                })
        }
    </script>

<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sala de Reunião — FLC Bank</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/@daily-co/daily-js"></script>
    <style>
        :root {
            --gold: #cdb34d;
            --gold-border: rgba(205, 179, 77, 0.2);
            --black: #000;
            --black-2: #0a0a0a;
            --white: #fff;
            --gray: #a0a0a0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            background: var(--black);
            color: var(--white);
            font-family: "DM Sans", sans-serif;
            overflow: hidden;
        }

        .top-line {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 28px;
            background: var(--black-2);
            border-bottom: 1px solid var(--gold-border);
            position: relative;
            z-index: 10;
            gap: 16px;
        }

        .topbar img {
            height: 26px;
            flex-shrink: 0;
        }

        .info {
            font-size: 12px;
            color: var(--gray);
            flex: 1;
        }

        .info strong {
            color: var(--gold);
            font-weight: 400;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .live {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 10px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--gold);
        }

        .pulse {
            width: 6px;
            height: 6px;
            background: var(--gold);
            border-radius: 50%;
            animation: pulse 2s ease infinite;
        }

        .btn-encerrar {
            padding: 8px 18px;
            background: transparent;
            color: #f87171;
            border: 1px solid rgba(248, 113, 113, 0.4);
            cursor: pointer;
            font-family: "DM Sans", sans-serif;
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        .btn-encerrar:hover {
            background: rgba(248, 113, 113, 0.1);
        }

        /* Background controls */
        .bg-controls {
            position: relative;
            display: inline-block;
        }

        .btn-bg {
            padding: 8px 14px;
            background: transparent;
            color: var(--gold);
            border: 1px solid var(--gold-border);
            cursor: pointer;
            font-family: "DM Sans", sans-serif;
            font-size: 10px;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        .btn-bg:hover {
            background: rgba(205, 179, 77, 0.1);
        }

        .btn-bg.active {
            background: rgba(205, 179, 77, 0.2);
            border-color: var(--gold);
        }

        .bg-dropdown {
            display: none;
            position: absolute;
            top: 100%;
            right: 0;
            background: #111;
            border: 1px solid var(--gold-border);
            padding: 10px;
            min-width: 220px;
            z-index: 100;
            margin-top: 8px;
        }

        .bg-dropdown.show {
            display: block;
        }

        .bg-option {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.2s;
            margin-bottom: 4px;
        }

        .bg-option:hover,
        .bg-option.selected {
            border-color: var(--gold-border);
            background: rgba(205, 179, 77, 0.05);
        }

        .bg-option .thumb {
            width: 40px;
            height: 30px;
            border: 1px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            background: #0a0a0a;
            overflow: hidden;
        }

        .bg-option .thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .bg-option .label {
            font-size: 11px;
            color: var(--gray);
            letter-spacing: 1px;
        }

        .bg-option.selected .label {
            color: var(--gold);
        }

        .bg-upload-btn {
            display: block;
            width: 100%;
            margin-top: 8px;
            padding: 6px;
            background: transparent;
            color: var(--gray);
            border: 1px dashed #333;
            cursor: pointer;
            font-size: 10px;
            text-align: center;
            font-family: "DM Sans", sans-serif;
        }

        .bg-upload-btn:hover {
            border-color: var(--gold);
            color: var(--gold);
        }

        #daily-container {
            position: fixed;
            top: 53px;
            left: 0;
            right: 0;
            bottom: 0;
        }

        #loading {
            position: fixed;
            top: 53px;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            background: var(--black);
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 1px solid var(--gold-border);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .lt {
            font-size: 10px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--gray);
        }

        #modal-enc {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 999;
            align-items: center;
            justify-content: center;
        }

        .modal-box {
            background: #0a0a0a;
            border: 1px solid rgba(248, 113, 113, 0.3);
            padding: 40px;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }

        .modal-box h3 {
            font-family: "Cormorant Garamond", serif;
            font-size: 26px;
            color: #fff;
            margin-bottom: 12px;
        }

        .modal-box p {
            font-size: 13px;
            color: var(--gray);
            line-height: 1.6;
            margin-bottom: 28px;
        }

        .modal-btns {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0.2
            }
        }
    </style>
</head>

        <div class="info">Reunião com <strong>{{LEAD_NAME}}</strong> &nbsp;·&nbsp; {{SCHEDULED_AT}}</div>

                    </div>

                        <div class="thumb">🌁</div>

                    </div>
                    <div class="bg-option" onclick="setBg('flcbank')" id="bg-flcbank">

    <div id="loading">

        <p class="lt">Conectando como especialista</p>
    </div>
    <div id="daily-container"></div>
    <div id="modal-enc">
        <div class="modal-box">
            <h3>Encerrar reunião?</h3>
            <p>Isso vai desconectar <strong style="color:#fff">todos os participantes</strong> e marcar como concluída.
            </p>
            <div class="modal-btns">
                <button onclick="encerrarParaTodos()"
                    style="padding:12px 24px;background:#f87171;color:#000;border:none;cursor:pointer;font-size:11px;letter-spacing:2px;text-transform:uppercase;font-weight:600">Encerrar</button>
                <button onclick="document.getElementById('modal-enc').style.display='none'"
                    style="padding:12px 24px;background:transparent;color:#666;border:1px solid rgba(255,255,255,0.1);cursor:pointer;font-size:11px;letter-spacing:2px;text-transform:uppercase">Cancelar</button>
            </div>
        </div>
    </div>
    <script>
        var roomUrl = "{{ROOM_URL}}";
        var roomName = "{{ROOM_NAME}}";
        var token = "{{TOKEN}}";
        var frame = null;

        var LEFT_HTML = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:20px;background:#000"><p style="font-size:10px;letter-spacing:4px;text-transform:uppercase;color:#cdb34d">Você saiu da chamada</p><h2 style="font-family:Cormorant Garamond,serif;font-size:36px;color:#fff">Reunião em andamento</h2><p style="color:#606060;font-size:14px">Os outros participantes continuam conectados.</p><div style="display:flex;gap:12px;margin-top:8px"><button onclick="location.reload()" style="padding:14px 28px;background:#cdb34d;color:#000;border:none;cursor:pointer;font-size:11px;letter-spacing:2px;text-transform:uppercase;font-weight:600">Reconectar</button><a href="/dashboard" style="padding:14px 28px;background:transparent;color:#666;border:1px solid rgba(255,255,255,0.1);font-size:11px;letter-spacing:2px;text-transform:uppercase;text-decoration:none;display:flex;align-items:center">← Agenda</a></div></div>';
        var ENCERRAR_HTML = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:20px;background:#000"><p style="font-size:10px;letter-spacing:4px;text-transform:uppercase;color:#cdb34d">Reunião Encerrada</p><h2 style="font-family:Cormorant Garamond,serif;font-size:36px;color:#fff">Até breve!</h2><a href="/dashboard" style="color:#666;font-size:11px;letter-spacing:2px;text-decoration:none;margin-top:8px">← Voltar para Agenda</a></div>';

        if (!roomUrl || roomUrl.indexOf("{{") !== -1) {
            document.getElementById("loading").innerHTML = "<p style=\"color:#cdb34d;letter-spacing:3px;text-transform:uppercase;font-size:11px\">Sala não disponível</p><br><a href=\"/dashboard\" style=\"color:#666;font-size:12px\">← Voltar</a>";
        } else {
            frame = window.DailyIframe.createFrame(
                document.getElementById("daily-container"),
                {
                    iframeStyle: { position: "absolute", top: "0", left: "0", width: "100%", height: "100%", border: "none" },
                    showLeaveButton: true, showFullscreenButton: true, lang: "pt-BR"
                }
            );
            frame
                .on("loaded", function () { document.getElementById("loading").style.display = "none"; })
                .on("joined-meeting", function () {
                    document.getElementById("loading").style.display = "none";
                    // Auto-start gravação cloud
                    setTimeout(function () {
                        try {
                            frame.startRecording({ layout: { preset: "active-participant" } });
                            console.log("🔴 Gravação iniciada automaticamente");
                        } catch (e) {
                            console.log("⚠️ Erro ao iniciar gravação:", e);
                        }
                    }, 3000); // Espera 3s pra sala estabilizar
                })
                .on("recording-started", function () {
                    var recDot = document.createElement("div");
                    recDot.id = "rec-indicator";
                    recDot.innerHTML = "🔴 GRAVANDO";
                    recDot.style.cssText = "position:fixed;top:10px;right:10px;background:rgba(0,0,0,0.7);color:#ff4444;padding:6px 14px;border-radius:20px;font-size:11px;letter-spacing:1px;z-index:999;font-family:DM Sans,sans-serif;";
                    document.body.appendChild(recDot);
                })
                .on("recording-stopped", function () {
                    var ind = document.getElementById("rec-indicator");
                    if (ind) ind.remove();
                })
                .on("left-meeting", function () { document.body.innerHTML = LEFT_HTML; });

            var joinOpts = { url: roomUrl };
            if (token) joinOpts.token = token;
            frame.join(joinOpts);
        }

        function confirmarEncerrar() {
            document.getElementById("modal-enc").style.display = "flex";
        }

        function encerrarParaTodos() {
            document.getElementById("modal-enc").style.display = "none";
            // Para gravação antes de encerrar
            if (frame) { try { frame.stopRecording(); } catch (e) { } }
            fetch("/reuniao/api/meetings/by-room/" + roomName + "/encerrar", { method: "POST" }).catch(function () { });
            // Espera 2s pra gravação salvar antes de sair
            setTimeout(function () {
                if (frame) { try { frame.leave(); } catch (e) { } }
                document.body.innerHTML = ENCERRAR_HTML;
            }, 2000);
        }

        // ── BACKGROUND CONTROLS ──────────────────────────────────────
        var currentBg = "none";
        var customBgData = null;

        // FLC Bank background - gold gradient with logo
        var FLC_BG = "data:image/svg+xml;base64," + btoa('<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080"><defs><linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#0a0a0a"/><stop offset="50%" style="stop-color:#111111"/><stop offset="100%" style="stop-color:#0a0a0a"/></linearGradient></defs><rect width="1920" height="1080" fill="url(#g)"/><text x="960" y="500" text-anchor="middle" font-family="Georgia,serif" font-size="72" fill="#cdb34d" opacity="0.3">FLC Bank</text><text x="960" y="580" text-anchor="middle" font-family="Arial,sans-serif" font-size="24" fill="#cdb34d" opacity="0.2">Hub de Crédito</text><line x1="760" y1="520" x2="1160" y2="520" stroke="#cdb34d" stroke-width="1" opacity="0.15"/></svg>');

        function toggleBgMenu() {
            var dd = document.getElementById("bg-dropdown");
            dd.classList.toggle("show");
        }

        // Close dropdown when clicking outside
        document.addEventListener("click", function (e) {
            if (!e.target.closest(".bg-controls")) {
                document.getElementById("bg-dropdown").classList.remove("show");
            }
        });

        function setBg(type) {
            if (!frame) return;
            currentBg = type;

            // Update selected state
            document.querySelectorAll(".bg-option").forEach(function (el) { el.classList.remove("selected"); });
            var el = document.getElementById("bg-" + type);
            if (el) el.classList.add("selected");

            // Update button state
            var btn = document.getElementById("bg-toggle");
            btn.classList.toggle("active", type !== "none");

            try {
                if (type === "none") {
                    frame.updateInputSettings({
                        video: { processor: { type: "none" } }
                    });
                } else if (type === "blur-light") {
                    frame.updateInputSettings({
                        video: { processor: { type: "background-blur", config: { strength: 0.4 } } }
                    });
                } else if (type === "blur-strong") {
                    frame.updateInputSettings({
                        video: { processor: { type: "background-blur", config: { strength: 0.9 } } }
                    });
                } else if (type === "flcbank") {
                    frame.updateInputSettings({
                        video: { processor: { type: "background-image", config: { source: FLC_BG } } }
                    });
                } else if (type === "custom" && customBgData) {
                    frame.updateInputSettings({
                        video: { processor: { type: "background-image", config: { source: customBgData } } }
                    });
                }
                console.log("🎨 Fundo alterado: " + type);
            } catch (e) {
                console.log("⚠️ Erro ao alterar fundo:", e);
                alert("Seu navegador pode não suportar fundo virtual. Tente usar Chrome ou Edge.");
            }
        }

        function uploadBg(input) {
            if (!input.files || !input.files[0]) return;
            var file = input.files[0];
            if (file.size > 5 * 1024 * 1024) {
                alert("Imagem muito grande. Máximo 5MB.");
                return;
            }
            var reader = new FileReader();
            reader.onload = function (e) {
                customBgData = e.target.result;

                // Add custom option to dropdown if not exists
                var existing = document.getElementById("bg-custom");
                if (!existing) {
                    var opt = document.createElement("div");
                    opt.className = "bg-option";
                    opt.id = "bg-custom";
                    opt.onclick = function () { setBg("custom"); };
                    opt.innerHTML = '<div class="thumb"><img src="' + customBgData + '"></div><div class="label">Personalizado</div>';
                    var uploadBtn = document.querySelector(".bg-upload-btn");
                    uploadBtn.parentNode.insertBefore(opt, uploadBtn);
                } else {
                    existing.querySelector("img").src = customBgData;
                }

                setBg("custom");
                document.getElementById("bg-dropdown").classList.remove("show");
            };
            reader.readAsDataURL(file);
        }
    </script>
</body>

</html>
